name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Push orphan branch to Hugging Face (no history, no binaries)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Copy only the code files we want to deploy (no examples/)
          mkdir /tmp/hf_deploy
          cp -r app.py main.py requirements.txt Dockerfile src/ tests/ .github/ /tmp/hf_deploy/
          
          # Create a completely fresh git repo (no history, no binary commits)
          cd /tmp/hf_deploy
          git init
          git add .
          git commit -m "deploy: fresh deployment"
          
          # Force push this clean history to Hugging Face
          git push --force https://ImdataScientistSachin:$HF_TOKEN@huggingface.co/spaces/ImdataScientistSachin/Ratina_face main
