name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/github-action@v1
        with:
          factory-user: ImdataScientistSachin
          factory-space: Ratina_Face
          github-token: ${{ secrets.GITHUB_TOKEN }}
          huggingface-token: ${{ secrets.HF_TOKEN }}
