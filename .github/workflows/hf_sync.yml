name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clean project for Hugging Face
        run: |
          # Remove examples directory to avoid binary file rejection and keep Space lean
          rm -rf examples/
          # Configure Git credentials
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Commit the removal for the temporary push
          git add .
          git commit -m "chore: clean project for deployment"

      - name: Push to Hub
        uses: nateraw/huggingface-sync-action@v0.0.5
        with:
          github_repo_id: ImdataScientistSachin/Ratina_Face
          huggingface_repo_id: ImdataScientistSachin/Ratina_face
          repo_type: space
          hf_token: ${{ secrets.HF_TOKEN }}
